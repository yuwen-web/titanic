<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>新增乘客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input,
        select {
            padding: 6px;
            width: 300px;
        }

        button {
            margin-top: 20px;
            padding: 8px 16px;
        }
    </style>
</head>

<body>
    <nav style="margin-bottom:16px;">
        <a href="/">乘客資料 (CRUD)</a>
        <a href="/train" style="margin-left:12px;">模型訓練</a>
        <a href="/predict" style="margin-left:12px;">預測</a>
    </nav>
    <h1>新增乘客</h1>

    <form id="passengerForm">
        <label>Survived</label>
        <select name="Survived" required>
            <option value="0">0：未生還</option>
            <option value="1">1：生還</option>
        </select>

        <label>Pclass</label>
        <select name="Pclass" required>
            <option value="1">1 等艙</option>
            <option value="2">2 等艙</option>
            <option value="3">3 等艙</option>
        </select>

        <label>Name</label>
        <input name="Name" required>

        <label>Sex</label>
        <select name="Sex" required>
            <option value="male">male</option>
            <option value="female">female</option>
        </select>

        <label>Age</label>
        <input name="Age" type="number" step="0.01">

        <label>SibSp</label>
        <input name="SibSp" type="number" min="0" value="0" required>

        <label>Parch</label>
        <input name="Parch" type="number" min="0" value="0" required>

        <label>Ticket</label>
        <input name="Ticket" required>

        <label>Fare</label>
        <input name="Fare" type="number" step="0.0001" min="0" value="0" required>

        <label>Cabin</label>
        <input name="Cabin">

        <label>Embarked</label>
        <select name="Embarked">
            <option value="">未知</option>
            <option value="C">C</option>
            <option value="Q">Q</option>
            <option value="S">S</option>
        </select>

        <button type="submit">新增</button>
        <a href="/">回首頁</a>
    </form>

    <script>
        // 監聽 passengerForm 的 submit 事件，當表單被提交時，會觸發這個事件處理器。
        document.getElementById("passengerForm").addEventListener("submit", async function (event) {
            // 阻止表單的預設提交行為
            event.preventDefault();

            // 取得表單元素，並使用 FormData 物件來收集表單資料
            const form = event.target;
            const formData = new FormData(form);

            // 將 FormData 物件轉換成一般的 JavaScript 物件，
            // 這樣我們就可以把它轉成 JSON 格式
            const data = Object.fromEntries(formData.entries());

            // 請求新增乘客
            const response = await fetch("/api/passengers", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            // 取得回應
            const result = await response.json();

            // 如果新增失敗，會取得 error 屬性，顯示錯誤訊息給使用者
            if (!response.ok) {
                alert(result.error);
                return;
            }

            alert("新增成功");

            // 修改成功後，回到首頁
            window.location.href = "/";
        });
    </script>
</body>

</html>
